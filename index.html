<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇰🇷 한국 vs 체코 🇨🇿 내기판</title>
<style>
  :root {
    --navy: #0B1530;
    --red: #CD2E3A;
    --blue: #0047A0;
    --gold: #F2B705;
    --green: #2E9E5B;
    --ink: #F4F6FB;
    --muted: rgba(244,246,251,0.55);
    --line: rgba(244,246,251,0.14);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1B3B7A 0%, var(--navy) 55%) fixed;
    color: var(--ink);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }
  .wrap { max-width: 680px; margin: 0 auto; }

  .sync {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 12px;
  }
  .sync .dot { width: 8px; height: 8px; border-radius: 50%; background: #8a8f9e; flex: none; }
  .sync.on .dot { background: var(--green); box-shadow: 0 0 8px rgba(46,158,91,0.8); }
  .sync.off .dot { background: var(--red); }

  .match {
    text-align: center; border: 1px solid var(--line); border-radius: 20px;
    padding: 26px 18px 22px;
    background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
    position: relative; overflow: hidden;
  }
  .match::before {
    content: ""; position: absolute; inset: 0;
    background:
      linear-gradient(115deg, rgba(205,46,58,0.18) 0%, transparent 38%),
      linear-gradient(-115deg, rgba(0,71,160,0.22) 0%, transparent 38%);
    pointer-events: none;
  }
  .eyebrow { font-size: 12px; letter-spacing: 0.18em; color: var(--muted); font-weight: 700; }
  .teams { display: flex; align-items: center; justify-content: center; gap: 22px; margin: 14px 0 10px; }
  .team { width: 130px; }
  .team .flag-img {
    width: 84px; height: 56px; border-radius: 8px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.15);
    display: block; margin: 0 auto;
  }
  .team .name { font-size: 18px; font-weight: 900; margin-top: 10px; }
  .flag-mini {
    width: 27px; height: 18px; border-radius: 3px; vertical-align: -3px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.2);
  }
  .vs { font-size: 14px; font-weight: 800; color: var(--gold); letter-spacing: 0.2em; }
  .kickoff { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .kickoff b { color: var(--ink); }

  .card {
    border: 1px solid var(--line); border-radius: 18px;
    background: rgba(255,255,255,0.035); padding: 20px 18px; margin-top: 16px;
  }
  .card h2 { font-size: 15px; font-weight: 900; margin-bottom: 14px; }
  .card h2 .sub { font-size: 12px; font-weight: 600; color: var(--muted); margin-left: 6px; }

  label { display: block; font-size: 11.5px; font-weight: 700; color: var(--muted); margin-bottom: 5px; }
  input, select {
    width: 100%; padding: 11px 12px; border-radius: 12px;
    border: 1px solid var(--line); background: rgba(11,21,48,0.6);
    color: var(--ink); font-size: 15px; font-family: inherit; outline: none;
  }
  input:focus, select:focus { border-color: var(--gold); }
  input[type=number] { text-align: center; font-size: 24px; font-weight: 900; padding: 8px; font-variant-numeric: tabular-nums; }
  .grid { display: flex; gap: 10px; }
  .grid > div { flex: 1; min-width: 0; }
  .mt { margin-top: 12px; }
  .score-input { display: flex; align-items: flex-end; gap: 10px; }
  .score-input .colon { font-size: 26px; font-weight: 900; padding-bottom: 8px; color: var(--muted); }

  button.cta {
    width: 100%; margin-top: 16px; padding: 13px;
    border: none; border-radius: 12px;
    font-size: 15px; font-weight: 900; font-family: inherit;
    cursor: pointer; color: #fff;
    background: linear-gradient(135deg, var(--red), #A31E29);
    transition: transform .08s ease, filter .15s ease;
  }
  button.cta:hover { filter: brightness(1.1); }
  button.cta:active { transform: scale(0.98); }
  button.cta.settle { background: linear-gradient(135deg, var(--green), #1F7A43); }
  button.cta.share { background: linear-gradient(135deg, #2D6FD1, var(--blue)); margin-top: 10px; }

  .bet {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; border-radius: 14px;
    border: 1px solid var(--line); background: rgba(11,21,48,0.45);
    margin-bottom: 9px; transition: border-color .2s, background .2s;
  }
  .bet .nm { font-weight: 800; font-size: 15px; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .bet .ex { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
  .bet .sc { font-size: 24px; font-weight: 900; letter-spacing: 1px; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .bet .sc .k { color: #FF8E97; } .bet .sc .c { color: #8FB6FF; }
  .bet.hit-exact { border-color: var(--gold); background: rgba(242,183,5,0.10); box-shadow: 0 0 18px rgba(242,183,5,0.18); }
  .bet.hit-result { border-color: var(--green); background: rgba(46,158,91,0.10); }
  .bet.miss { opacity: 0.45; }
  .pill { font-size: 10.5px; font-weight: 800; padding: 3px 9px; border-radius: 999px; white-space: nowrap; }
  .pill.gold { background: var(--gold); color: #2b2100; }
  .pill.green { background: var(--green); color: #fff; }
  .x { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; margin-left: 10px; padding: 4px; }
  .x:hover { color: var(--red); }
  .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 18px 0; }

  .verdict {
    margin-top: 14px; padding: 16px; border-radius: 14px;
    text-align: center; font-size: 14px; line-height: 1.7;
    border: 1px dashed var(--line); background: rgba(255,255,255,0.03);
  }
  .verdict .final { font-size: 30px; font-weight: 900; letter-spacing: 2px; margin: 4px 0 8px; font-variant-numeric: tabular-nums; }
  .verdict b { color: var(--gold); }

  .hint { font-size: 11.5px; color: var(--muted); text-align: center; margin-top: 10px; line-height: 1.6; }

  .toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(80px);
    background: var(--green); color: #fff; font-size: 13.5px; font-weight: 800;
    padding: 12px 22px; border-radius: 999px; opacity: 0;
    transition: transform .25s ease, opacity .25s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 99;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  @media (max-width: 480px) {
    .team { width: 100px; }
    .team .flag { font-size: 38px; }
    .grid.form-top { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- 국기 SVG 정의 (윈도우에서도 깨지지 않는 진짜 국기) -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <!-- 대한민국 태극기 -->
    <symbol id="flag-kr" viewBox="0 0 90 60">
      <rect width="90" height="60" fill="#FFFFFF"/>
      <g transform="rotate(-33.69 45 30)">
        <circle cx="45" cy="30" r="15" fill="#0047A0"/>
        <path d="M 30,30 A 15,15 0 0 1 60,30 A 7.5,7.5 0 0 1 45,30 A 7.5,7.5 0 0 0 30,30 Z" fill="#CD2E3A"/>
      </g>
      <!-- 건 ☰ (좌상) -->
      <g transform="translate(22.5 15) rotate(-56.31)" fill="#0F0F0F">
        <rect x="-8" y="-6.2" width="16" height="2.6"/>
        <rect x="-8" y="-1.3" width="16" height="2.6"/>
        <rect x="-8" y="3.6"  width="16" height="2.6"/>
      </g>
      <!-- 감 ☵ (우상) -->
      <g transform="translate(67.5 15) rotate(56.31)" fill="#0F0F0F">
        <rect x="-8" y="-6.2" width="7" height="2.6"/><rect x="1" y="-6.2" width="7" height="2.6"/>
        <rect x="-8" y="-1.3" width="16" height="2.6"/>
        <rect x="-8" y="3.6"  width="7" height="2.6"/><rect x="1" y="3.6" width="7" height="2.6"/>
      </g>
      <!-- 리 ☲ (좌하) -->
      <g transform="translate(22.5 45) rotate(56.31)" fill="#0F0F0F">
        <rect x="-8" y="-6.2" width="16" height="2.6"/>
        <rect x="-8" y="-1.3" width="7" height="2.6"/><rect x="1" y="-1.3" width="7" height="2.6"/>
        <rect x="-8" y="3.6"  width="16" height="2.6"/>
      </g>
      <!-- 곤 ☷ (우하) -->
      <g transform="translate(67.5 45) rotate(-56.31)" fill="#0F0F0F">
        <rect x="-8" y="-6.2" width="7" height="2.6"/><rect x="1" y="-6.2" width="7" height="2.6"/>
        <rect x="-8" y="-1.3" width="7" height="2.6"/><rect x="1" y="-1.3" width="7" height="2.6"/>
        <rect x="-8" y="3.6"  width="7" height="2.6"/><rect x="1" y="3.6" width="7" height="2.6"/>
      </g>
    </symbol>
    <!-- 체코 국기 -->
    <symbol id="flag-cz" viewBox="0 0 90 60">
      <rect width="90" height="30" fill="#FFFFFF"/>
      <rect y="30" width="90" height="30" fill="#D7141A"/>
      <path d="M 0,0 L 45,30 L 0,60 Z" fill="#11457E"/>
    </symbol>
  </defs>
</svg>

<div class="wrap">

  <div class="sync" id="sync"><span class="dot"></span><span id="sync-text">연결 확인 중...</span></div>

  <div class="match">
    <div class="eyebrow">2026 FIFA 월드컵 · A조 조별리그 1차전</div>
    <div class="teams">
      <div class="team"><svg class="flag-img"><use href="#flag-kr"/></svg><div class="name">대한민국</div></div>
      <div class="vs">VS</div>
      <div class="team"><svg class="flag-img"><use href="#flag-cz"/></svg><div class="name">체코</div></div>
    </div>
    <div class="kickoff"><b>6월 12일 (금) 오전 11:00</b> 한국시각<br>멕시코 과달라하라 스타디움 · JTBC / KBS2 중계</div>
  </div>

  <div class="card">
    <h2>⚽ 예측 등록</h2>
    <div class="grid form-top">
      <div><label>이름</label><input id="f-name" placeholder="예: 상재" maxlength="12"></div>
    </div>
    <div class="grid mt">
      <div>
        <label>스코어 예측</label>
        <div class="score-input">
          <div style="flex:1"><label style="text-align:center"><svg class="flag-mini"><use href="#flag-kr"/></svg> 한국</label><input id="f-kr" type="number" min="0" max="15" value="1"></div>
          <div class="colon">:</div>
          <div style="flex:1"><label style="text-align:center"><svg class="flag-mini"><use href="#flag-cz"/></svg> 체코</label><input id="f-cz" type="number" min="0" max="15" value="0"></div>
        </div>
      </div>
      <div>
        <label>첫 골 주인공 (선택)</label>
        <select id="f-scorer">
          <option value="">선택 안 함</option>
          <option>손흥민</option>
          <option>이강인</option>
          <option>황희찬</option>
          <option>오현규</option>
          <option>이재성</option>
          <option>김민재</option>
          <option>기타 한국 선수</option>
          <option>시크 (체코)</option>
          <option>기타 체코 선수</option>
          <option>무득점 경기</option>
        </select>
      </div>
    </div>
    <button class="cta" onclick="addBet()">예측 등록하기</button>
    <button class="cta share" onclick="shareLink()">📋 공유 링크 복사</button>
    <div class="hint">친구들에게 <b>공유 링크</b>를 보내야 같은 내기판에 참여할 수 있어요.</div>
  </div>

  <div class="card">
    <h2>📋 참가자 예측<span class="sub" id="count"></span></h2>
    <div id="list"><div class="empty">아직 등록된 예측이 없어요. 첫 번째로 걸어보세요!</div></div>
  </div>

</div>

<div class="toast" id="toast">링크가 복사됐어요! 카톡에 붙여넣으세요 📋</div>

<script>
  // ── 공유 저장소: jsonblob.com (무료, 가입 불필요) ──
  // 첫 방문자가 자동으로 공유방(blob)을 만들고, 방 ID가 URL(#room=...)에 붙습니다.
  // 그 링크로 들어온 사람은 모두 같은 데이터를 보고, 5초마다 자동 동기화됩니다.
  const API = 'https://jsonblob.com/api/jsonBlob';
  const LS_KEY = 'toto-kr-cz-v3';
  const LS_ROOM = 'toto-kr-cz-v3-room';

  let roomId = null;
  let bets = {};       // { id: {name, kr, cz, scorer, ts} }
  let actual = null;   // { kr, cz, ts }
  let deleted = [];    // 삭제된 예측 id (기기 간 삭제 동기화용)
  let pushing = false;

  const $ = id => document.getElementById(id);
  const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };
  const outcome = (a, b) => a > b ? 'W' : a < b ? 'L' : 'D';

  function setSync(state, text) {
    const el = $('sync');
    el.classList.remove('on', 'off');
    if (state === true) { el.classList.add('on'); $('sync-text').textContent = text || '실시간 공유 중 · 모두 같은 데이터를 봐요'; }
    else if (state === false) { el.classList.add('off'); $('sync-text').textContent = text || '오프라인 · 이 기기에만 저장돼요'; }
    else { $('sync-text').textContent = text || '연결 확인 중...'; }
  }

  // ── 로컬 캐시 ──
  function loadLocal() {
    try {
      const s = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      bets = s.bets || {}; actual = s.actual || null; deleted = s.deleted || [];
    } catch (e) { bets = {}; actual = null; deleted = []; }
  }
  function saveLocal() {
    try { localStorage.setItem(LS_KEY, JSON.stringify({ bets, actual, deleted })); } catch (e) {}
  }

  // ── 원격 상태 병합 ──
  function mergeRemote(remote) {
    const before = JSON.stringify({ bets, actual, deleted });
    deleted = [...new Set([...deleted, ...(remote.deleted || [])])];
    bets = Object.assign({}, remote.bets || {}, bets);
    deleted.forEach(id => delete bets[id]);
    const ra = remote.actual;
    if (ra && (!actual || (ra.ts || 0) > (actual.ts || 0))) actual = ra;
    return before !== JSON.stringify({ bets, actual, deleted });
  }

  function getRoomFromHash() {
    const m = location.hash.match(/room=([A-Za-z0-9]+)/);
    return m ? m[1] : null;
  }
  function setHash() {
    try { history.replaceState(null, '', '#room=' + roomId); } catch (e) {}
  }

  // ── 원격 통신 ──
  async function createRoom() {
    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bets, actual, deleted })
      });
      if (!res.ok) throw new Error(res.status);
      const loc = res.headers.get('Location') || res.headers.get('X-jsonblob') || '';
      const id = loc.split('/').pop();
      if (!id) throw new Error('no id');
      roomId = id;
      localStorage.setItem(LS_ROOM, roomId);
      setHash();
      setSync(true);
      return true;
    } catch (e) {
      setSync(false);
      return false;
    }
  }

  async function pull() {
    if (!roomId) return false;
    try {
      const res = await fetch(API + '/' + roomId, { cache: 'no-store' });
      if (res.status === 404) return null; // 방이 만료됨
      if (!res.ok) throw new Error(res.status);
      const remote = await res.json();
      const changed = mergeRemote(remote || {});
      if (changed) { saveLocal(); render(); }
      setSync(true);
      return true;
    } catch (e) {
      setSync(false);
      return false;
    }
  }

  async function push() {
    if (!roomId || pushing) return;
    pushing = true;
    try {
      // 최신 원격 상태를 먼저 합친 뒤 저장 → 다른 사람 데이터가 지워지지 않음
      try {
        const res = await fetch(API + '/' + roomId, { cache: 'no-store' });
        if (res.ok) mergeRemote(await res.json() || {});
      } catch (e) {}
      const put = await fetch(API + '/' + roomId, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bets, actual, deleted })
      });
      if (!put.ok) throw new Error(put.status);
      saveLocal();
      setSync(true);
    } catch (e) {
      setSync(false);
    } finally {
      pushing = false;
    }
  }

  // ── 등록 / 삭제 ──
  function addBet() {
    const name = $('f-name').value.trim();
    if (!name) { $('f-name').focus(); $('f-name').style.borderColor = '#CD2E3A'; return; }
    $('f-name').style.borderColor = '';
    const id = 'b' + Date.now() + Math.random().toString(36).slice(2, 6);
    bets[id] = {
      name,
      kr: Math.max(0, parseInt($('f-kr').value) || 0),
      cz: Math.max(0, parseInt($('f-cz').value) || 0),
      scorer: $('f-scorer').value,
      ts: Date.now()
    };
    $('f-name').value = '';
    saveLocal();
    render();
    push();
  }

  function removeBet(id) {
    if (!confirm('이 예측을 삭제할까요?')) return;
    delete bets[id];
    deleted.push(id);
    saveLocal();
    render();
    push();
  }

  // ── 공유 ──
  function shareLink() {
    const url = location.href;
    const done = () => {
      const t = $('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(done).catch(() => fallbackCopy(url, done));
    } else {
      fallbackCopy(url, done);
    }
  }
  function fallbackCopy(text, done) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); done(); } catch (e) { prompt('아래 링크를 복사하세요:', text); }
    document.body.removeChild(ta);
  }

  // ── 렌더 ──
  function render() {
    const entries = Object.entries(bets).sort((a, b) => (a[1].ts || 0) - (b[1].ts || 0));
    $('count').textContent = entries.length ? entries.length + '명 참가' : '';
    if (!entries.length) {
      $('list').innerHTML = '<div class="empty">아직 등록된 예측이 없어요. 첫 번째로 걸어보세요!</div>';
      return;
    }
    $('list').innerHTML = entries.map(([id, b]) => {
      let cls = '', pill = '';
      if (actual) {
        if (b.kr === actual.kr && b.cz === actual.cz) { cls = 'hit-exact'; pill = '<span class="pill gold">🎯 스코어 적중</span>'; }
        else if (outcome(b.kr, b.cz) === outcome(actual.kr, actual.cz)) { cls = 'hit-result'; pill = '<span class="pill green">승무패 적중</span>'; }
        else cls = 'miss';
      }
      const extra = b.scorer ? '첫 골: ' + esc(b.scorer) : '';
      return `<div class="bet ${cls}">
        <div>
          <div class="nm">${esc(b.name)} ${pill}</div>
          ${extra ? `<div class="ex">${extra}</div>` : ''}
        </div>
        <div style="display:flex;align-items:center;">
          <span class="sc"><svg class="flag-mini"><use href="#flag-kr"/></svg> <span class="k">${b.kr}</span> : <span class="c">${b.cz}</span> <svg class="flag-mini"><use href="#flag-cz"/></svg></span>
          <button class="x" onclick="removeBet('${id}')" title="삭제">✕</button>
        </div>
      </div>`;
    }).join('');
  }

  // ── 시작 ──
  async function init() {
    loadLocal();
    render();

    roomId = getRoomFromHash() || localStorage.getItem(LS_ROOM);
    if (roomId) {
      localStorage.setItem(LS_ROOM, roomId);
      setHash();
      const ok = await pull();
      if (ok === null) { roomId = null; await createRoom(); } // 방 만료 → 새로 생성
      else if (ok) await push(); // 내 로컬 데이터도 방에 합치기
    } else {
      await createRoom();
    }

    if (roomId) {
      setInterval(pull, 5000);
      document.addEventListener('visibilitychange', () => { if (!document.hidden) pull(); });
    }
  }

  $('f-name').addEventListener('keydown', e => { if (e.key === 'Enter') addBet(); });
  init();
